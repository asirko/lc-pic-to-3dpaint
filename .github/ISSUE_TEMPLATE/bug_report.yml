name: "Bug report"
description: "Signaler un problème"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Décris clairement le problème rencontré.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Comment reproduire le bug ?
      value: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Observer ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Que devrait-il se passer ?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Captures d'écran
      description: Si applicable, ajoute des captures.
    validations:
      required: false
  - type: dropdown
    id: browser
    attributes:
      label: Navigateur
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Autre
    validations:
      required: false
